services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    image: node:20-slim
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run build && npx vite preview --host 0.0.0.0 --port 4173"
    ports:
      - "4173:4173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend
